kind = "web"
previewPath = "/"
title = "فزعة - FAZAA"
version = "1.0.0"
id = "artifacts/fazaa"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19006

[services.development]
run = "pnpm --filter @workspace/fazaa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fazaa", "run", "build" ]
serve = "static"
publicDir = "artifacts/fazaa/out"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19006"
BASE_PATH = "/"
